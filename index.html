<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

    :root {
      --font-heading: 'Syne', 'Trebuchet MS', sans-serif;
      --font-body: 'IBM Plex Sans', 'Gill Sans', sans-serif;
    }

    * {
      color: #fff;
      background-color: #000;
      margin: 0;
      padding: 0;
      font-family: var(--font-body);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-direction: column;
      padding: 3.2rem 4rem;
    }

    h1 {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 3rem;
      text-align: center;
      line-height: 3rem;
      margin-bottom: 2.4rem;
    }

    h2 {
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 1.8rem;
      min-width: 18ch;
      max-width: 36ch;
      text-align: center;
      line-height: 2.2rem;
    }

    h3 {
      font-family: var(--font-heading);
      font-weight: 400;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>My Portfolio</h1>
    <h2>Enjoy this showcase of frontend engineering through the lens of renewable energy.</h2>
  </div>
  <script src="script.js"></script>
</body>
</html>
